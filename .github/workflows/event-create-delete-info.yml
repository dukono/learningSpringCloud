name: Event - Create/Delete Branch or Tag Info
on:
  create:
  delete:

jobs:
  show-create-delete-info:
    runs-on: ubuntu-latest
    steps:
      - name: create-delete-event-root
        run: |
          echo "=== CREATE / DELETE EVENT ==="
          echo "github.event_name (create o delete)":  "${{ github.event_name }}"
          echo "github.event.ref":                     "${{ github.event.ref }}"
          echo "github.event.ref_type (branch/tag)":   "${{ github.event.ref_type }}"
          echo "github.event.master_branch":            "${{ github.event.master_branch }}"
          echo "github.event.description":              "${{ github.event.description }}"
          echo "github.event.pusher_type":              "${{ github.event.pusher_type }}"

      - name: create-delete-sender
        run: |
          echo "=== SENDER ==="
          echo "sender.login":                         "${{ github.event.sender.login }}"
          echo "sender.id":                            "${{ github.event.sender.id }}"
          echo "sender.type":                          "${{ github.event.sender.type }}"
          echo "sender.site_admin":                    "${{ github.event.sender.site_admin }}"

      - name: create-delete-repository
        run: |
          echo "=== REPOSITORY ==="
          echo "repository.name":                      "${{ github.event.repository.name }}"
          echo "repository.full_name":                 "${{ github.event.repository.full_name }}"
          echo "repository.default_branch":            "${{ github.event.repository.default_branch }}"
          echo "repository.private":                   "${{ github.event.repository.private }}"
          echo "repository.html_url":                  "${{ github.event.repository.html_url }}"

      - name: create-delete-github-context
        run: |
          echo "=== GITHUB CONTEXT ==="
          echo "github.event_name":                    "${{ github.event_name }}"
          echo "github.ref":                           "${{ github.ref }}"
          echo "github.ref_name":                      "${{ github.ref_name }}"
          echo "github.ref_type":                      "${{ github.ref_type }}"
          echo "github.sha":                           "${{ github.sha }}"
          echo "github.actor":                         "${{ github.actor }}"
          echo "github.run_id":                        "${{ github.run_id }}"
          echo "github.run_number":                    "${{ github.run_number }}"
          echo "github.workflow":                      "${{ github.workflow }}"

      - name: create-delete-conditional
        run: |
          echo "=== CONDICIONALES ==="
          echo "es branch":                            "${{ github.event.ref_type == 'branch' }}"
          echo "es tag":                               "${{ github.event.ref_type == 'tag' }}"
          echo "es create":                            "${{ github.event_name == 'create' }}"
          echo "es delete":                            "${{ github.event_name == 'delete' }}"
          echo "es tag de release (empieza con v)":    "${{ github.event.ref_type == 'tag' && startsWith(github.event.ref, 'v') }}"

