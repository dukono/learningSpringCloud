name: Deploy Config
on:
  push:
    branches: [main]
    paths:
      - config-server/src
      - pom.xml
      - dockerfile
      - .github/workflows/deploy-config.yml

jobs:
  prepare:
    uses: ./.github/workflows/reusable.yml
    with:
      NAME: "config"
  build:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      security-events: write
    outputs:
      DEPLOY_TAG: ${{ needs.prepare.outputs.DEPLOY_TAG }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build y test
        run: |
          cd config-server
          mvn -B package

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Build y Push imagen Docker
        uses: docker/build-push-action@v7
        with:
          file: config-server/Dockerfile
          context: config-server
          push: true
          tags:  ${{ needs.prepare.outputs.DEPLOY_TAG }}
          sbom: true

      - name: Escanear vulnerabilidades con Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.prepare.outputs.DEPLOY_TAG }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Subir resultados de seguridad a GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deply echo
        run: |
          echo "Deploying image-path: ${{ needs.build.outputs.DEPLOY_TAG }}"
      - name: Deploy en Northflank
        uses: northflank/deploy-to-northflank@v1
        with:
          northflank-api-key: ${{ secrets.NORTHFLANK_API_KEY }}
          project-id: ${{ vars.NORTHFLANK_PROJECT_ID }}
          service-id: ${{ vars.NORTHFLANK_SERVICE_CONFIG_ID }}
          image-path: ${{ needs.build.outputs.DEPLOY_TAG }}
          credentials-id: ${{ secrets.NORTHFLANK_CREDENTIALS_ID }}
