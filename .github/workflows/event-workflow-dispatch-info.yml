name: Event - Workflow Dispatch Info
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno destino'
        required: true
        type: choice
        options:
          - development
          - staging
          - production
        default: 'development'
      version:
        description: 'Versión a desplegar'
        required: false
        type: string
        default: 'latest'
      debug:
        description: 'Habilitar modo debug'
        required: false
        type: boolean
        default: false
      reason:
        description: 'Razón del dispatch manual'
        required: false
        type: string

jobs:
  show-dispatch-info:
    runs-on: ubuntu-latest
    steps:
      - name: dispatch-inputs
        run: |
          echo "=== WORKFLOW_DISPATCH INPUTS ==="
          echo "inputs.environment":            "${{ inputs.environment }}"
          echo "inputs.version":                "${{ inputs.version }}"
          echo "inputs.debug":                  "${{ inputs.debug }}"
          echo "inputs.reason":                 "${{ inputs.reason }}"
          echo "--- mismos valores via github.event.inputs ---"
          echo "github.event.inputs.environment": "${{ github.event.inputs.environment }}"
          echo "github.event.inputs.version":     "${{ github.event.inputs.version }}"
          echo "github.event.inputs.debug":       "${{ github.event.inputs.debug }}"
          echo "github.event.inputs.reason":      "${{ github.event.inputs.reason }}"

      - name: dispatch-event-root
        run: |
          echo "=== WORKFLOW_DISPATCH EVENT (atributos raíz) ==="
          echo "github.event.action":           "${{ github.event.action }}"
          echo "github.event (json completo)":  "${{ toJson(github.event) }}"

      - name: dispatch-github-context
        run: |
          echo "=== GITHUB CONTEXT ==="
          echo "github.event_name":             "${{ github.event_name }}"
          echo "github.ref":                    "${{ github.ref }}"
          echo "github.ref_name":               "${{ github.ref_name }}"
          echo "github.ref_type":               "${{ github.ref_type }}"
          echo "github.sha":                    "${{ github.sha }}"
          echo "github.actor":                  "${{ github.actor }}"
          echo "github.triggering_actor":       "${{ github.triggering_actor }}"
          echo "github.workflow":               "${{ github.workflow }}"
          echo "github.workflow_ref":           "${{ github.workflow_ref }}"
          echo "github.run_id":                 "${{ github.run_id }}"
          echo "github.run_number":             "${{ github.run_number }}"
          echo "github.run_attempt":            "${{ github.run_attempt }}"
          echo "github.repository":             "${{ github.repository }}"
          echo "github.repository_owner":       "${{ github.repository_owner }}"

      - name: dispatch-conditional-debug
        if: inputs.debug == true
        run: |
          echo "=== DEBUG MODE ACTIVADO ==="
          echo "Ejecutando con información extendida..."
          env

