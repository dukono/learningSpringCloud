name: Deploy App
on:
  push:
    branches: [main]
    paths:
      - app/src
      - pom.xml
      - dockerfile
      - .github/workflows/deploy-app.yml

jobs:
  prepare:
    uses: ./.github/workflows/reusable.yml
    with:
      NAME: "app"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    outputs:
      DEPLOY_TAG: ${{ needs.prepare.outputs.DEPLOY_TAG }}
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build y test
        run: |
          cd app
          mvn -B package

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y Push imagen Docker
        uses: docker/build-push-action@v7
        with:
          file: app/dockerfile
          context: app
          push: true
          tags: ${{ needs.prepare.outputs.DEPLOY_TAG }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deply echo
        run: |
          echo "Deploying image-path: ${{ needs.build.outputs.DEPLOY_TAG }}"
      - name: Deploy en Northflank
        uses: northflank/deploy-to-northflank@v1
        with:
          northflank-api-key: ${{ secrets.NORTHFLANK_API_KEY }}
          project-id: ${{ vars.NORTHFLANK_PROJECT_ID }}
          service-id: ${{ vars.NORTHFLANK_SERVICE_ID }}
          image-path: ${{ needs.build.outputs.DEPLOY_TAG }}
          credentials-id: ${{ secrets.NORTHFLANK_CREDENTIALS_ID }}
